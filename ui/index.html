<!DOCTYPE html>
<html lang="vi">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hệ Thống Quản Lý Thư Viện</title>
    <link rel="stylesheet" href="style.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;700;900&display=swap" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css" rel="stylesheet">
</head>

<body>
    <div class="cursor-glow"></div>

    <main class="welcome-screen">
        <!-- Left side - Branding -->
        <div class="brand-side">
            <div class="brand-content fade-in-up">
                <div class="logo">
                    <i class="fa-solid fa-book-open-reader"></i>
                    <span>THƯ VIỆN<span class="dot">.</span></span>
                </div>
                <h1>Quản lý<br>thư viện<br>thông minh.</h1>
                <p>Nền tảng quản lý tài nguyên thư viện hiện đại, đơn giản và hiệu quả.</p>
            </div>
            <footer class="brand-footer fade-in-up" style="animation-delay:0.4s">
                <p>&copy; 2026 Hệ Thống Quản Lý Thư Viện</p>
            </footer>
        </div>

        <!-- Right side - Login -->
        <div class="login-side">
            <div class="login-card fade-in-up" style="animation-delay:0.2s">
                <h2>Đăng nhập</h2>
                <p class="login-subtitle">Chào mừng bạn trở lại</p>

                <form id="loginForm">
                    <div class="input-group">
                        <label for="username">Tên đăng nhập</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-user"></i>
                            <input type="text" id="username" placeholder="Nhập tên đăng nhập" required>
                        </div>
                    </div>

                    <div class="input-group">
                        <label for="password">Mật khẩu</label>
                        <div class="input-wrapper">
                            <i class="fa-solid fa-lock"></i>
                            <input type="password" id="password" placeholder="Nhập mật khẩu" required>
                        </div>
                    </div>

                    <div class="form-options">
                        <label class="checkbox-label">
                            <input type="checkbox" id="remember">
                            <span>Ghi nhớ đăng nhập</span>
                        </label>
                        <a href="#" class="forgot-link">Quên mật khẩu?</a>
                    </div>

                    <button type="submit" class="btn-primary">
                        Bắt đầu ngay
                        <i class="fa-solid fa-arrow-right"></i>
                    </button>
                </form>

                <div class="login-footer">
                    <p>Chưa có tài khoản? <a href="#">Đăng ký</a></p>
                </div>
            </div>
        </div>
    </main>

    <script>
        const cursor = document.querySelector('.cursor-glow');
        document.addEventListener('mousemove', (e) => {
            cursor.style.left = e.clientX + 'px';
            cursor.style.top = e.clientY + 'px';
        });
    </script>
</body>

</html>
